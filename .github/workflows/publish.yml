name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Enforce lockfile policy
        run: npm run check:supply-chain

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Build
        run: npm run build

      - name: Run fuzz tests
        run: npm run test:fuzz

      - name: Verify tag version
        run: |
          PACKAGE_VERSION="v$(node -p 'require("./package.json").version')"
          if [ "${GITHUB_REF_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Preview npm package contents
        run: npm pack --dry-run

      - name: Create release tarball
        id: pack
        run: |
          mkdir -p .release/npm
          npm pack --json --pack-destination .release/npm > .release/npm/pack.json
          TARBALL_PATH="$(node -e 'const fs = require("node:fs"); const entries = JSON.parse(fs.readFileSync(".release/npm/pack.json", "utf8")); process.stdout.write(`.release/npm/${entries[0].filename}`)')"
          echo "tarball_path=${TARBALL_PATH}" >> "$GITHUB_OUTPUT"

      - name: Generate release checksum
        run: sha256sum "${{ steps.pack.outputs.tarball_path }}" > .release/npm/sha256sum.txt

      - name: Publish to npm (trusted publishing)
        run: npm publish --provenance --access public

      - name: Attest release tarball
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball_path }}

      - name: Download release attestation bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIGEST="$(sha256sum "${{ steps.pack.outputs.tarball_path }}" | cut -d' ' -f1)"
          gh attestation download "${{ steps.pack.outputs.tarball_path }}" --repo "${GITHUB_REPOSITORY}" --limit 1
          BUNDLE_PATH="sha256:${DIGEST}.jsonl"
          if [ ! -f "${BUNDLE_PATH}" ]; then
            BUNDLE_PATH="sha256-${DIGEST}.jsonl"
          fi
          mv "${BUNDLE_PATH}" ".release/npm/${GITHUB_REF_NAME}.intoto.jsonl"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "${{ steps.pack.outputs.tarball_path }}" \
              .release/npm/sha256sum.txt \
              ".release/npm/${GITHUB_REF_NAME}.intoto.jsonl" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${{ steps.pack.outputs.tarball_path }}" \
              .release/npm/sha256sum.txt \
              ".release/npm/${GITHUB_REF_NAME}.intoto.jsonl" \
              --generate-notes \
              --verify-tag
          fi
